<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Linguo the Fox - Thinking -->
  <!-- Thought bubbles -->
  <circle cx="150" cy="45" r="4" fill="#E5E5E5"/>
  <circle cx="158" cy="35" r="6" fill="#E5E5E5"/>
  <circle cx="168" cy="22" r="9" fill="#E5E5E5"/>
  <ellipse cx="60" cy="170" rx="35" ry="15" fill="#FF8C42" transform="rotate(-20, 60, 170)"/>
  <ellipse cx="42" cy="165" rx="12" ry="8" fill="#FFFFFF" transform="rotate(-20, 42, 165)"/>
  <ellipse cx="100" cy="150" rx="40" ry="35" fill="#FF8C42"/>
  <ellipse cx="100" cy="155" rx="28" ry="25" fill="#FFD4A8"/>
  <!-- Paw on chin -->
  <ellipse cx="130" cy="110" rx="8" ry="12" fill="#FF8C42" transform="rotate(-20, 130, 110)"/>
  <circle cx="100" cy="90" r="40" fill="#FF8C42"/>
