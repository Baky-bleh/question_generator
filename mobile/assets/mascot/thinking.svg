  <polygon points="72,55 64,28 85,50" fill="#FFD4A8"/>
  <polygon points="132,60 142,20 112,50" fill="#FF8C42"/>
  <polygon points="128,55 136,28 115,50" fill="#FFD4A8"/>
  <ellipse cx="100" cy="100" rx="30" ry="25" fill="#FFD4A8"/>
  <!-- Thinking eyes - looking up -->
  <circle cx="85" cy="83" r="6" fill="#3C3C3C"/>
  <circle cx="115" cy="83" r="6" fill="#3C3C3C"/>
  <circle cx="87" cy="80" r="2.5" fill="#FFFFFF"/>
  <circle cx="117" cy="80" r="2.5" fill="#FFFFFF"/>
  <ellipse cx="100" cy="97" rx="5" ry="3.5" fill="#3C3C3C"/>
  <!-- Hmm mouth -->
  <path d="M95,105 L105,105" stroke="#3C3C3C" stroke-width="2" stroke-linecap="round"/>
</svg>
