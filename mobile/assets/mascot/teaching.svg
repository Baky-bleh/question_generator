<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Linguo the Fox - Teaching -->
  <!-- Light bulb -->
  <circle cx="155" cy="40" r="12" fill="#FFC800" opacity="0.3"/>
  <circle cx="155" cy="40" r="8" fill="#FFC800" opacity="0.6"/>
  <circle cx="155" cy="40" r="4" fill="#FFC800"/>
  <!-- Rays -->
  <line x1="155" y1="24" x2="155" y2="18" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
  <line x1="168" y1="40" x2="174" y2="40" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="30" x2="170" y2="25" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="60" cy="170" rx="35" ry="15" fill="#FF8C42" transform="rotate(-20, 60, 170)"/>
  <ellipse cx="42" cy="165" rx="12" ry="8" fill="#FFFFFF" transform="rotate(-20, 42, 165)"/>
  <ellipse cx="100" cy="150" rx="40" ry="35" fill="#FF8C42"/>
  <ellipse cx="100" cy="155" rx="28" ry="25" fill="#FFD4A8"/>
