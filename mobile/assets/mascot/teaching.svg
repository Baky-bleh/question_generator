  <!-- Wise eyes -->
  <circle cx="85" cy="85" r="6" fill="#3C3C3C"/>
  <circle cx="115" cy="85" r="6" fill="#3C3C3C"/>
  <circle cx="87" cy="83" r="2" fill="#FFFFFF"/>
  <circle cx="117" cy="83" r="2" fill="#FFFFFF"/>
  <!-- Raised eyebrow -->
  <path d="M108,76 Q115,72 122,76" stroke="#3C3C3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="97" rx="5" ry="3.5" fill="#3C3C3C"/>
  <!-- Knowing smile -->
  <path d="M90,103 Q100,111 110,103" stroke="#3C3C3C" stroke-width="2" fill="none" stroke-linecap="round"/>
